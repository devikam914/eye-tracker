<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GazeBrowse - Web Browser</title>
    <link rel="stylesheet" href="browsing_new.css">
</head>
<body>
    <div class="browser-container">
        <!-- Top Section: Search & Browser Info (40%) -->
        <div class="top-section">
            <div class="header">
                <div class="header-left">
                    <button class="back-btn" onclick="goBackToHome()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                        Back to Home
                    </button>
                    <div class="dwell-control">
                        <button class="dwell-btn" onclick="decreaseDwell()">−</button>
                        <div class="dwell-display">
                            <span id="dwell-value">1.5</span>s
                        </div>
                        <button class="dwell-btn" onclick="increaseDwell()">+</button>
                    </div>
                    <label class="theme-toggle">
                        <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode()">
                        <span class="theme-slider">
                            <span class="theme-icon moon">🌙</span>
                            <span class="theme-icon sun">☀️</span>
                        </span>
                    </label>
                </div>
                <h1 class="title">🌐 GazeBrowse</h1>
            </div>

            <!-- Search Display -->
            <div class="search-container">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Type your search..." readonly>
                    <button class="clear-search-btn" onclick="clearSearch()">✕</button>
                </div>
                <button class="speak-btn" onclick="speakText()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                    </svg>
                    SPEAK
                </button>
                <button class="call-btn" onclick="goToCalling()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                    </svg>
                    CALL
                </button>
                <button class="search-btn" onclick="performSearch()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    SEARCH
                </button>
            </div>

            <!-- Quick Links -->
            <div class="quick-links">
                <button class="quick-link" onclick="quickSearch('YouTube')">
                    <span class="link-icon">📺</span>
                    YouTube
                </button>
                <button class="quick-link" onclick="quickSearch('Wikipedia')">
                    <span class="link-icon">📚</span>
                    Wikipedia
                </button>
                <button class="quick-link" onclick="quickSearch('News')">
                    <span class="link-icon">📰</span>
                    News
                </button>
                <button class="quick-link" onclick="quickSearch('Weather')">
                    <span class="link-icon">🌤️</span>
                    Weather
                </button>
            </div>
        </div>

        <!-- Bottom Section: Virtual Keyboard (60%) -->
        <div class="keyboard-section">
            <div class="keyboard-tabs">
                <button class="tab-btn active" data-mode="abc" onclick="switchMode('abc')">ABC</button>
                <button class="tab-btn" data-mode="123" onclick="switchMode('123')">123</button>
                <button class="tab-btn" data-mode="symbols" onclick="switchMode('symbols')">!@#</button>
            </div>

            <div class="keyboard-content">
                <!-- ABC Layout -->
                <div class="keyboard-layout active" id="abc-layout">
                    <div class="key-row">
                        <button class="key" data-key="Q">Q</button>
                        <button class="key" data-key="W">W</button>
                        <button class="key" data-key="E">E</button>
                        <button class="key" data-key="R">R</button>
                        <button class="key" data-key="T">T</button>
                        <button class="key" data-key="Y">Y</button>
                        <button class="key" data-key="U">U</button>
                        <button class="key" data-key="I">I</button>
                        <button class="key" data-key="O">O</button>
                        <button class="key" data-key="P">P</button>
                    </div>
                    <div class="key-row">
                        <button class="key" data-key="A">A</button>
                        <button class="key" data-key="S">S</button>
                        <button class="key" data-key="D">D</button>
                        <button class="key" data-key="F">F</button>
                        <button class="key" data-key="G">G</button>
                        <button class="key" data-key="H">H</button>
                        <button class="key" data-key="J">J</button>
                        <button class="key" data-key="K">K</button>
                        <button class="key" data-key="L">L</button>
                    </div>
                    <div class="key-row">
                        <button class="key" data-key="Z">Z</button>
                        <button class="key" data-key="X">X</button>
                        <button class="key" data-key="C">C</button>
                        <button class="key" data-key="V">V</button>
                        <button class="key" data-key="B">B</button>
                        <button class="key" data-key="N">N</button>
                        <button class="key" data-key="M">M</button>
                        <button class="key special-key space-key" data-key="SPACE">SPACE</button>
                        <button class="key special-key delete-key" data-key="DELETE">⌫</button>
                    </div>
                </div>

                <!-- Numbers Layout -->
                <div class="keyboard-layout" id="123-layout">
                    <div class="key-row">
                        <button class="key" data-key="1">1</button>
                        <button class="key" data-key="2">2</button>
                        <button class="key" data-key="3">3</button>
                        <button class="key" data-key="4">4</button>
                        <button class="key" data-key="5">5</button>
                        <button class="key" data-key="6">6</button>
                        <button class="key" data-key="7">7</button>
                        <button class="key" data-key="8">8</button>
                        <button class="key" data-key="9">9</button>
                        <button class="key" data-key="0">0</button>
                    </div>
                    <div class="key-row">
                        <button class="key" data-key="-">-</button>
                        <button class="key" data-key="/">/</button>
                        <button class="key" data-key=":">:</button>
                        <button class="key" data-key=";">;</button>
                        <button class="key" data-key="(">(</button>
                        <button class="key" data-key=")">)</button>
                        <button class="key" data-key="$">$</button>
                        <button class="key" data-key="&">&</button>
                        <button class="key" data-key="@">@</button>
                        <button class="key" data-key=".">.</button>
                    </div>
                    <div class="key-row">
                        <button class="key special-key" data-key="SPACE">SPACE</button>
                        <button class="key special-key delete-key" data-key="DELETE">⌫</button>
                    </div>
                </div>

                <!-- Symbols Layout -->
                <div class="keyboard-layout" id="symbols-layout">
                    <div class="key-row">
                        <button class="key" data-key="!">!</button>
                        <button class="key" data-key="@">@</button>
                        <button class="key" data-key="#">#</button>
                        <button class="key" data-key="$">$</button>
                        <button class="key" data-key="%">%</button>
                        <button class="key" data-key="^">^</button>
                        <button class="key" data-key="&">&</button>
                        <button class="key" data-key="*">*</button>
                        <button class="key" data-key="(">(</button>
                        <button class="key" data-key=")">)</button>
                    </div>
                    <div class="key-row">
                        <button class="key" data-key="_">_</button>
                        <button class="key" data-key="-">-</button>
                        <button class="key" data-key="+">+</button>
                        <button class="key" data-key="=">=</button>
                        <button class="key" data-key="/">/</button>
                        <button class="key" data-key="\\">\</button>
                        <button class="key" data-key="|">|</button>
                        <button class="key" data-key="[">[</button>
                        <button class="key" data-key="]">]</button>
                        <button class="key" data-key=".">.</button>
                    </div>
                    <div class="key-row">
                        <button class="key special-key" data-key="SPACE">SPACE</button>
                        <button class="key special-key delete-key" data-key="DELETE">⌫</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="browsing_new.js"></script>
</body>
</html>
